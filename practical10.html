<!DOCTYPE html>
<html lang="en">
<head>
    <title>Iframe Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        iframe {
            border: 2px solid #444;
            margin: 10px;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
        }
        .box {
            width: 48%;
        }
    </style>
</head>
<body>

<h1>Iframe Demonstration</h1>

<div class="container">

    <!-- Google Maps Embed -->
    <div class="box">
        <h2>Google Maps</h2>
        <iframe 
            src="https://www.google.com/maps?q=Pune&output=embed"
            width="100%" height="300">
        </iframe>
    </div>

     <!-- External Website -->
    <div class="box">
        <h2>External Website</h2>
        <iframe 
            src="https://en.wikipedia.org/wiki/Taj_Mahal"
            width="100%" height="300">
        </iframe>
    </div>
</div>

</body>
</html>
